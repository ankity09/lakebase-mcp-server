command:
  - python
  - mcp_server.py

# ── Autoscaling Lakebase (Neon-based) ────────────────────────────────
# Use this block instead of `resources:` for autoscaling Lakebase instances.
# Remove or comment out the `resources:` block below when using autoscaling.
#
# env:
#   - name: LAKEBASE_PROJECT_NAME
#     value: "My Project"             # Human-readable label shown in the UI
#   - name: LAKEBASE_PROJECT
#     value: "99a2c711-..."           # Project ID (UUID from Lakebase project URL)
#   - name: LAKEBASE_BRANCH
#     value: "br-cool-haze-d2hbxj2m" # Branch ID (from branch overview page, NOT the display name)
#   - name: LAKEBASE_DATABASE
#     value: "my_database"            # Database name (default: databricks_postgres)

# ── Provisioned Lakebase ─────────────────────────────────────────────
# Use this block for standard provisioned Lakebase instances.
# Remove or comment out the `env:` block above when using provisioned.
resources:
  - name: database
    database:
      instance_name: supply-chain
      database_name: supply_chain_db
      permission: CAN_CONNECT_AND_CREATE
  - name: database-2
    database:
      instance_name: f5-logs-intel
      database_name: f5_logs_intel
      permission: CAN_CONNECT_AND_CREATE
  - name: database-3
    database:
      instance_name: papeg-demo
      database_name: papeg_demo_db
      permission: CAN_CONNECT_AND_CREATE
  - name: database-4
    database:
      instance_name: ai-builder
      database_name: smartfarm
      permission: CAN_CONNECT_AND_CREATE
  - name: database-5
    database:
      instance_name: ai-builder
      database_name: radius_fleet_safety
      permission: CAN_CONNECT_AND_CREATE
  - name: database-6
    database:
      instance_name: ai-builder
      database_name: zoox_fleet_intel
      permission: CAN_CONNECT_AND_CREATE
