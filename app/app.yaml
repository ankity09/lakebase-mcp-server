command:
  - python
  - mcp_server.py

# ── Autoscaling Lakebase (Neon-based) ────────────────────────────────
# LAKEBASE_PROJECT       = primary project UUID (used for DB connections)
# LAKEBASE_PROJECT_NAMES = human-readable names for ALL projects: "uuid1=Name One,uuid2=Name Two"
# LAKEBASE_BRANCH        = branch ID for the primary project (optional, default: production)
# LAKEBASE_DATABASE      = database name for the primary project (optional, default: databricks_postgres)
env:
  - name: LAKEBASE_PROJECT_NAMES
    value: "0d32a239-6eb5-47b8-a1c3-950e3072edda=autoscaling-mcp-test-project,372e4f39-ce0f-4dbb-944a-12f3543f64ba=app-project"
  - name: LAKEBASE_PROJECT
    value: "0d32a239-6eb5-47b8-a1c3-950e3072edda"
  - name: LAKEBASE_BRANCH
    value: "br-billowing-rice-d2fc8f26"
  - name: LAKEBASE_DATABASE
    value: "databricks_postgres"
